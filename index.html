        body { background: #f1f5f9; padding: 20px; display: flex; justify-content: center; flex-direction: column; align-items: center; }

        textarea { width: 100%; height: 230px; border: 2px solid #e2e8f0; border-radius: 16px; padding: 15px; font-size: 14px; background: var(--gray); resize: none; }

        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }

        .btn-combo-ef12 { background: var(--orange); color: white; }
        .btn-combo-ef4 { background: var(--teal); color: white; }
        .btn-clear { background: #f1f5f9; color: #64748b; margin-top: 10px; }
        .btn-clear:hover { background: var(--danger); color: white; }
        .result { background: var(--dark); color: #e2e8f0; padding: 25px; border-radius: 20px; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 13px; min-height: 600px; }
        .copy-btn { background: var(--s); color: white; margin-top: 15px; }
        footer { margin-top: 30px; color: #64748b; font-size: 13px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px; width: 100%; max-width: 400px; }
        .dev-tag { font-weight: 700; color: var(--p); }
    </style>

<script>
    // FUNĂĂO PARA PERSISTIR O VENDEDOR
    function salvarVendedor() {
        const selecao = document.getElementById('vendedor').value;
        localStorage.setItem('vendedorFixo', selecao);
    }

    function carregarVendedor() {
        const salvo = localStorage.getItem('vendedorFixo');
        if (salvo) {
            document.getElementById('vendedor').value = salvo;
        }
    }

    // Carrega o nome assim que a pĂĄgina abre
    window.onload = carregarVendedor;

    function calcularVencimentoInteligente() {
        const hoje = new Date().getDate();
        if (hoje >= 5 && hoje <= 13) return "10";
        if (hoje >= 14 && hoje <= 24) return "20";
        return "30";
    }

    function aplicarCombo(variante) {
        document.getElementById('financeiro').value = "Boleto";
        document.getElementById('vencimento').value = calcularVencimentoInteligente();
        const tipo = document.getElementById('tipo');
        const valor = document.getElementById('valor');
        const curso = document.getElementById('curso');

        switch(variante) {
            case 'Bacharel12':
                tipo.value = "2ÂŞ GraduaĂ§ĂŁo";
                valor.value = "1+12X DE R$159,00";
                curso.value = "BACHAREL EM EDUCAĂĂO FĂSICA 12 MESES";
                break;
            case 'Licenc12':
                tipo.value = "2ÂŞ GraduaĂ§ĂŁo";
                valor.value = "1+12X DE R$159,00";
                curso.value = "LICENCIATURA EM EDUCAĂĂO FĂSICA 12 MESES";
                break;
            case 'Bacharel4':
                tipo.value = "GraduaĂ§ĂŁo";
                valor.value = "1+48x de R$146,86";
                curso.value = "BACHARELADO EM EDUCAĂĂO FĂSICA 4 ANOS";
                break;
            case 'Licenc4':
                tipo.value = "GraduaĂ§ĂŁo";
                valor.value = "1+48x de R$146,86";
                curso.value = "LICENCIATURA EM EDUCAĂĂO FĂSICA 4 ANOS";
                break;
        }
    }

    function limparTudo() {
        const ids = ['rawInput', 'curso', 'carga', 'brinde', 'valor', 'vencimento'];
        ids.forEach(id => document.getElementById(id).value = "");
        document.getElementById('tipo').selectedIndex = 0;
        document.getElementById('financeiro').selectedIndex = 0;
        document.getElementById('output').innerText = "Os dados processados aparecerĂŁo aqui...";
    }

    function processarIA() {
        const raw = document.getElementById('rawInput').value;
        if (!raw) { alert("Cole os dados primeiro!"); return; }

        if (!document.getElementById('vencimento').value) {
            document.getElementById('vencimento').value = calcularVencimentoInteligente();
        }

        const linhas = raw.split('\n').map(l => l.trim()).filter(l => l.length > 1);
        let aluno = "", mae = "", cpf = "", tel = "", estadoCivil = "", cidade = "";
        let nomesCandidatos = [];
        const regexUF = /\s(AC|AL|AP|AM|BA|CE|DF|ES|GO|MA|MT|MS|MG|PA|PB|PR|PE|PI|RJ|RN|RS|RO|RR|SC|SP|SE|TO)$/i;

        linhas.forEach(linha => {
            const limpa = linha.toLowerCase();
            const cpfMatch = linha.match(/\d{3}\.?\d{3}\.?\d{3}-?\d{2}/g);
            if (cpfMatch) {
                cpfMatch.forEach(m => {
                    if (m.replace(/\D/g, "").length === 11 && (limpa.includes("cpf") || !cpf)) cpf = m;
                });
            }
            if (limpa.includes("cidade:")) {
                cidade = linha.split(/cidade:/i)[1].replace(/[:â]/g, "").trim();
            } else if (linha.includes("/")) {
                const partes = linha.split("/");
                if(partes[1] && partes[1].trim().length === 2) cidade = partes[0].replace(/[:â]/g, "").trim();
            } else if (regexUF.test(linha) && !limpa.includes("rua") && !limpa.includes("bairro")) {
                cidade = linha.replace(regexUF, "").trim();
            }
        });

        const ruidos = ["faculdade", "unifahe", "requerimento", "naturalidade", "ĂłrgĂŁo", "expedidor", "cidade", "estado", "email", "e-mail", "rua", "bairro", "cep", "nascimento", "polo", "central", "tel"];

        linhas.forEach((linha) => {
            const limpa = linha.toLowerCase();
            const valorPuro = linha.replace(/Nome completo|Nome da mĂŁe|Nome|Aluno|MĂŁe/gi, "").replace(/[:â]/g, "").trim();

            const regexCivil = /(solteiro|solteira|casado|casada|divorciado|divorciada|viĂşvo|viĂşva|uniĂŁo)/i;
            if (regexCivil.test(linha) && !estadoCivil) estadoCivil = linha.match(regexCivil)[0];

            const regexTel = /(?:\(?\d{2}\)?\s?)?(?:9\s?)?\d{4,5}[-\s]?\s?\d{4}/;
            if (regexTel.test(linha)) {
                let m = linha.match(regexTel)[0];
                if (m.replace(/\D/g, "").length >= 10 && m.replace(/\D/g, "") !== (cpf || "").replace(/\D/g, "")) tel = m;
            }

            const eRuido = ruidos.some(r => limpa.includes(r));
            const eCidade = cidade && (limpa.includes(cidade.toLowerCase()) || regexUF.test(linha));
            const temMuitosNumeros = (linha.replace(/\D/g, "").length > 6);
            
            if (!eRuido && !eCidade && !temMuitosNumeros && !valorPuro.includes("@") && valorPuro.split(" ").length >= 2) {
                if (limpa.includes("mĂŁe") || limpa.includes("mae")) {
                    mae = valorPuro;
                } else {
                    nomesCandidatos.push(valorPuro);
                }
            }
        });

        aluno = nomesCandidatos[0] || "";
        if (!mae) mae = nomesCandidatos[1] || "";

        let foneFinal = (tel || "").replace(/\D/g, "");
        if (foneFinal.startsWith("55") && foneFinal.length > 11) foneFinal = foneFinal.substring(2);
        if (foneFinal.length >= 10) {
            const ddd = foneFinal.substring(0, 2);
            const resto = foneFinal.substring(2);
            tel = `(${ddd}) ${resto.length === 9 ? resto.substring(0, 5) : resto.substring(0, 4)}-${resto.substring(resto.length-4)}`;
        }

        const template = `âš REQUERIMENTO COM PRĂ-MATRĂCULA
Nome Completo: ${aluno.toUpperCase()}
CPF: ${cpf}
Nome da MĂŁe: ${mae.toUpperCase()}
Estado Civil: ${estadoCivil ? estadoCivil.charAt(0).toUpperCase() + estadoCivil.slice(1) : ""}
Tel/Cel: ${tel}
Cidade: ${cidade.toUpperCase()}
Origem da Venda: ${document.getElementById('origem').value}

đ Tipo de Curso:
${["GraduaĂ§ĂŁo", "TecnĂłlogo", "PĂłs-graduaĂ§ĂŁo", "2ÂŞ Licenciatura", "R2", "AperfeiĂ§oamento", "ExtensĂŁo", "2ÂŞ GraduaĂ§ĂŁo"].map(t => document.getElementById('tipo').value === t ? `(X) ${t}` : `( ) ${t}`).join('\n')}

Curso: ${document.getElementById('curso').value.toUpperCase()}
Brinde: ${document.getElementById('brinde').value}

( ) PENDENTE
( ) NĂO QUIS

Carga HorĂĄria: ${document.getElementById('carga').value}
đ° FINANCEIRO:
( ${document.getElementById('financeiro').value === 'Boleto' ? 'X' : ' '} ) Boleto
( ${document.getElementById('financeiro').value === 'CartĂŁo' ? 'X' : ' '} ) CartĂŁo
( ${document.getElementById('financeiro').value === 'Quitado' ? 'X' : ' '} ) Quitado (valor Ă  vista)

â˘ Valor: R$ ${document.getElementById('valor').value}
â˘ Vencimento: ${document.getElementById('vencimento').value}

Polo: Unidade Central
Vendedor: ${document.getElementById('vendedor').value}`;

        document.getElementById('output').innerText = template;
    }

    function copiar() {
        const t = document.getElementById('output').innerText;
        navigator.clipboard.writeText(t).then(() => {
            const b = document.querySelector('.copy-btn');
            b.innerHTML = '<i class="fa-solid fa-check"></i> COPIADO!';
            setTimeout(() => { b.innerHTML = '<i class="fa-solid fa-copy"></i> COPIAR TEXTO'; }, 2000);
        });
    }
</script>
